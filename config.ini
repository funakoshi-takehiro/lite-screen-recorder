# Zoom録画ツール設定ファイル
# 「=」の右側を書き換えて保存してください。行頭が # の行はコメントです。

[recording]
# 画質プリセット: 高 / 中 / 低  （低スペックPCは「低」推奨）
preset=中

# エンコーダ: hardware = Intel QuickSync(軽量・推奨) / software = CPUのみ(QSV不可時)
encoder=hardware

# セグメント分割の長さ(秒)。1800=30分ごとに別ファイルに分割
segment_seconds=1800

# 出力先フォルダ(ツール直下からの相対、または絶対パス)
output_dir=録画データ

# 音声入力デバイス名(通常は変更不要。screen-capture-recorder導入で利用可能)
audio_device=virtual-audio-capturer

# 録音音量の増幅(デシベル)。0=そのまま, 6=約2倍, 大きすぎると音割れ。標準6
audio_gain_db=6

# 録画する画面の番号(0=メインモニタ。複数モニタ時に1,2…)
monitor_index=0

[presets]
# 形式 = 横幅,フレームレート,品質(数値が大きいほど低画質・低負荷・小サイズ)
高=1600,12,25
中=1280,10,29
低=960,8,33
